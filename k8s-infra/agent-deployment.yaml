# Déploiement de l'agent SysGuard-AI
# Reçoit les webhooks Falco Sidekick et orchestre la détection + remédiation

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sysguard-agent
  namespace: default
  labels:
    app: sysguard-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sysguard-agent
  template:
    metadata:
      labels:
        app: sysguard-agent
    spec:
      serviceAccountName: sysguard-agent
      containers:
        - name: agent
          image: sysguard-ai:latest
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_PATH
              value: "/app/ai_model/saved_model.pth"
            - name: THRESHOLD_PATH
              value: "/app/ai_model/threshold.json"
            - name: K8S_NAMESPACE
              value: "default"
            # true = pas de NetworkPolicy reelle (recommande pour premier test DVWA)
            - name: DRY_RUN
              value: "true"
            # LLM (Tier 2) — configurer selon le provider choisi
            - name: LLM_PROVIDER
              value: "openai"
            - name: LLM_MODEL
              value: "gpt-4o-mini"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sysguard-secrets
                  key: llm-api-key
                  optional: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sysguard-agent
  namespace: default
spec:
  selector:
    app: sysguard-agent
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
