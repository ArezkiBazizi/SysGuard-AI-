# Collecteur SysGuard-AI — Job Kubernetes pour la phase d'entrainement.
#
# POURQUOI UN JOB ET PAS UN DEPLOYMENT ?
#   Un Deployment redémarre le pod systematiquement (restartPolicy: Always).
#   Cela ecrasait le CSV a chaque redemarrage meme si collect_falco_data.py
#   est maintenant en mode reprise (append).
#   Un Job avec restartPolicy: OnFailure :
#     - redémarre uniquement en cas de crash (exit code != 0)
#     - s'arrete proprement quand la duree est atteinte (exit 0)
#     - conserve le CSV sur le PVC entre les redemarrages de crash
#
# PREREQUIS :
#   1. Falco deploye en MODE COLLECTE (falco-values.yaml : address = sysguard-collector:8001/collect)
#   2. DVWA doit recevoir du trafic HTTP continu (dvwa-load-generator.yaml)
#   3. Image sysguard-ai:latest chargee dans Minikube
#      minikube image load sysguard-ai:latest
#
# WORKFLOW COMPLET :
#   # 1. Deployer le generateur de trafic DVWA
#   kubectl apply -f k8s-infra/dvwa-load-generator.yaml
#
#   # 2. Deployer le collecteur
#   kubectl apply -f k8s-infra/collector-deployment.yaml
#
#   # 3. Surveiller (les logs montrent events/vecteurs chaque minute)
#   kubectl logs -f job/sysguard-collector -n default
#
#   # 4. Recuperer le CSV a la fin (ou avant si interrompu)
#   POD=$(kubectl get pod -n default -l job-name=sysguard-collector -o jsonpath="{.items[0].metadata.name}")
#   kubectl cp default/$POD:/data/normal_traffic.csv ai_model/dataset/normal_traffic_falco.csv
#
#   # 5. Entrainer le modele sur les donnees reelles
#   python ai_model/train_autoencoder.py --csv ai_model/dataset/normal_traffic_falco.csv --epochs 50
#
#   # 6. Supprimer les ressources de collecte (libere le PVC)
#   kubectl delete -f k8s-infra/collector-deployment.yaml
#   kubectl delete -f k8s-infra/dvwa-load-generator.yaml

---
apiVersion: batch/v1
kind: Job
metadata:
  name: sysguard-collector
  namespace: default
  labels:
    app: sysguard-collector
    component: training
spec:
  # Ne pas recrer automatiquement le Job apres completion
  ttlSecondsAfterFinished: 3600
  # Nombre max de tentatives en cas de crash (exit != 0)
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: sysguard-collector
        job-name: sysguard-collector
    spec:
      # OnFailure = redemarrage uniquement si crash, pas si exit 0 (fin normale)
      restartPolicy: OnFailure
      containers:
        - name: collector
          image: sysguard-ai:latest
          imagePullPolicy: Never
          command: ["python", "ai_model/collect_falco_data.py"]
          args:
            - "--port=8001"
            - "--duration=43200"
            - "--output=/data/normal_traffic.csv"
          ports:
            - containerPort: 8001
              name: http
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # Liveness : delai genereux (le serveur FastAPI prend ~10s a demarrer)
          # failureThreshold eleve pour eviter les faux redemarrages
          livenessProbe:
            httpGet:
              path: /stats
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /stats
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sysguard-collector-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sysguard-collector-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# Service expose le port HTTP pour que Falco Sidekick puisse poster
apiVersion: v1
kind: Service
metadata:
  name: sysguard-collector
  namespace: default
  labels:
    app: sysguard-collector
spec:
  selector:
    # Le Job cree des pods avec le label job-name=sysguard-collector
    job-name: sysguard-collector
  ports:
    - port: 8001
      targetPort: 8001
      protocol: TCP
      name: http
  type: ClusterIP
