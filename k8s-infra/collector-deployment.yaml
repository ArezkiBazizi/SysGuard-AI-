# Deployment du collecteur SysGuard-AI pour la phase d'entrainement.
#
# Le collecteur recoit les webhooks Falco (tous les syscalls via la regle
# catch-all "SysGuard syscall stream"), les agrege en histogrammes BoSC
# (414 dimensions, fenetres tumbling de 10s) et ecrit les vecteurs
# normalises dans un CSV.
#
# PREREQUIS :
#   1. Falco deploye avec falco-values.yaml en MODE COLLECTE
#      (webhook address = sysguard-collector:8001/collect)
#   2. L'application cible (DVWA) doit tourner et recevoir du trafic
#      NORMAL (pas d'attaques pendant la collecte).
#
# UTILISATION :
#   kubectl apply -f k8s-infra/collector-deployment.yaml
#   # Surveiller la progression :
#   kubectl logs -f deployment/sysguard-collector
#   # Recuperer le CSV une fois la collecte terminee :
#   kubectl cp default/$(kubectl get pod -l app=sysguard-collector -o name | head -1 | cut -d/ -f2):/data/normal_traffic.csv ai_model/dataset/normal_traffic.csv
#   # Puis entrainer le modele :
#   python ai_model/train_autoencoder.py --csv ai_model/dataset/normal_traffic.csv --epochs 50

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sysguard-collector
  namespace: default
  labels:
    app: sysguard-collector
    component: training
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sysguard-collector
  template:
    metadata:
      labels:
        app: sysguard-collector
        component: training
    spec:
      containers:
        - name: collector
          image: sysguard-ai:latest
          command: ["python", "ai_model/collect_falco_data.py"]
          args:
            - "--port=8001"
            - "--duration=43200"
            - "--output=/data/normal_traffic.csv"
          ports:
            - containerPort: 8001
              name: http
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /stats
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /stats
              port: 8001
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sysguard-collector-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sysguard-collector-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: sysguard-collector
  namespace: default
  labels:
    app: sysguard-collector
spec:
  selector:
    app: sysguard-collector
  ports:
    - port: 8001
      targetPort: 8001
      protocol: TCP
      name: http
  type: ClusterIP
